# =============================================================================
# GitHub Actions Workflow: Terraform Deploy for Obsidian CouchDB
# =============================================================================
# This workflow uses Workload Identity Federation (OIDC) for keyless auth to GCP.
# NO long-lived service account keys are stored in GitHub!
#
# MANUAL SETUP REQUIRED before this workflow will work:
# See README.md for complete Workload Identity Federation setup instructions.
# =============================================================================

name: "Terraform Deploy"

on:
  push:
    branches:
      - master
    paths:
      - "*.tf"
      - ".github/workflows/deploy.yml"
  pull_request:
    branches:
      - master
    paths:
      - "*.tf"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: # Allow manual trigger

# =============================================================================
# IMPORTANT: Workload Identity Federation Setup (MANUAL STEPS)
# =============================================================================
# Before this workflow can authenticate to GCP, you must:
#
# 1. Create a Workload Identity Pool:
#    gcloud iam workload-identity-pools create "github-actions-pool" \
#      --location="global" \
#      --display-name="GitHub Actions Pool"
#
# 2. Create a Workload Identity Provider (connects GitHub OIDC to GCP):
#    gcloud iam workload-identity-pools providers create-oidc "github-provider" \
#      --location="global" \
#      --workload-identity-pool="github-actions-pool" \
#      --display-name="GitHub Provider" \
#      --attribute-mapping="google.subject=assertion.sub,attribute.actor=assertion.actor,attribute.repository=assertion.repository,attribute.repository_owner=assertion.repository_owner" \
#      --attribute-condition="assertion.repository_owner == 'YOUR_GITHUB_USERNAME'" \
#      --issuer-uri="https://token.actions.githubusercontent.com"
#
# 3. Create a Service Account for Terraform:
#    gcloud iam service-accounts create terraform-github-actions \
#      --display-name="Terraform GitHub Actions"
#
# 4. Grant the Service Account necessary permissions:
#    gcloud projects add-iam-policy-binding YOUR_PROJECT_ID \
#      --member="serviceAccount:terraform-github-actions@YOUR_PROJECT_ID.iam.gserviceaccount.com" \
#      --role="roles/compute.admin"
#
#    gcloud projects add-iam-policy-binding YOUR_PROJECT_ID \
#      --member="serviceAccount:terraform-github-actions@YOUR_PROJECT_ID.iam.gserviceaccount.com" \
#      --role="roles/storage.admin"
#
# 5. Allow GitHub Actions to impersonate the Service Account:
#    gcloud iam service-accounts add-iam-policy-binding \
#      terraform-github-actions@YOUR_PROJECT_ID.iam.gserviceaccount.com \
#      --role="roles/iam.workloadIdentityUser" \
#      --member="principalSet://iam.googleapis.com/projects/YOUR_PROJECT_NUMBER/locations/global/workloadIdentityPools/github-actions-pool/attribute.repository/YOUR_GITHUB_USERNAME/YOUR_REPO_NAME"
#
# 6. Get your Workload Identity Provider resource name:
#    gcloud iam workload-identity-pools providers describe github-provider \
#      --location="global" \
#      --workload-identity-pool="github-actions-pool" \
#      --format="value(name)"
#
#    This gives you: projects/PROJECT_NUMBER/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider
#
# 7. Set GitHub repository secrets/variables:
#    Variables (Settings → Secrets and variables → Actions → Variables):
#    - GCP_PROJECT_ID: Your GCP project ID
#    - WIF_PROVIDER: The full provider name from step 6
#    - WIF_SERVICE_ACCOUNT: terraform-github-actions@YOUR_PROJECT_ID.iam.gserviceaccount.com
#
#    Secrets (Settings → Secrets and variables → Actions → Secrets):
#    - COUCHDB_PASSWORD: CouchDB password (required only if ENABLE_COUCHDB=true)
#    - TAILSCALE_AUTH_KEY: (Optional) Tailscale auth key for automatic private networking
#    - DUCKDNS_TOKEN: DuckDNS token (required if ENABLE_HTTPS=true)
#    - MCPVAULT_PASSWORD: MCPVault basic auth password (required if ENABLE_MCPVAULT=true)
#
#    Variables (Settings → Secrets and variables → Actions → Variables):
#    - ENABLE_COUCHDB: true/false (default: false — use Obsidian Sync instead)
#    - ENABLE_HEADLESS_OBSIDIAN: true/false (default: false)
#    - ENABLE_MCPVAULT: true/false (default: false)
#    - ENABLE_CLAUDE_CLI: true/false (default: false)
#    - ENABLE_HTTPS: true/false
#    - DUCKDNS_SUBDOMAIN: your-subdomain (without .duckdns.org)
#    - MCPVAULT_USER: basic auth username (default: admin)
#    - OBSIDIAN_VAULT_PATH: vault path on VM (default: /opt/obsidian-vault)
#
# =============================================================================

env:
  TF_VERSION: "1.9.0"
  TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
  TF_VAR_tailscale_auth_key: ${{ secrets.TAILSCALE_AUTH_KEY }}
  TF_VAR_enable_https: ${{ vars.ENABLE_HTTPS }}
  TF_VAR_duckdns_subdomain: ${{ vars.DUCKDNS_SUBDOMAIN }}
  TF_VAR_duckdns_token: ${{ secrets.DUCKDNS_TOKEN }}
  # CouchDB (legacy — disable when using Obsidian Sync)
  TF_VAR_enable_couchdb: ${{ vars.ENABLE_COUCHDB || 'false' }}
  TF_VAR_couchdb_password: ${{ secrets.COUCHDB_PASSWORD }}
  # New service flags
  TF_VAR_enable_headless_obsidian: ${{ vars.ENABLE_HEADLESS_OBSIDIAN || 'false' }}
  TF_VAR_enable_mcpvault: ${{ vars.ENABLE_MCPVAULT || 'false' }}
  TF_VAR_enable_claude_cli: ${{ vars.ENABLE_CLAUDE_CLI || 'false' }}
  TF_VAR_enable_runner: ${{ vars.ENABLE_RUNNER || 'false' }}
  TF_VAR_obsidian_vault_path: ${{ vars.OBSIDIAN_VAULT_PATH || '/opt/obsidian-vault' }}
  TF_VAR_mcpvault_user: ${{ vars.MCPVAULT_USER || 'admin' }}
  TF_VAR_mcpvault_password: ${{ secrets.MCPVAULT_PASSWORD }}
  # Optional: Override defaults via GitHub variables
  # TF_VAR_region: ${{ vars.GCP_REGION }}
  # TF_VAR_zone: ${{ vars.GCP_ZONE }}
  # TF_VAR_allowed_ips: ${{ vars.ALLOWED_IPS }}

# Permissions required for Workload Identity Federation
permissions:
  contents: read
  id-token: write # Required for OIDC token request

jobs:
  # ===========================================================================
  # Terraform Plan - Runs on all PRs and pushes
  # ===========================================================================
  terraform-plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # Checkout repository
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Authenticate to GCP using Workload Identity Federation
      # This requests an OIDC token from GitHub and exchanges it for GCP credentials
      # -----------------------------------------------------------------------
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true

      # -----------------------------------------------------------------------
      # Setup Terraform
      # -----------------------------------------------------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false # Disable wrapper for cleaner output

      # -----------------------------------------------------------------------
      # Terraform Format Check
      # -----------------------------------------------------------------------
      - name: Terraform Format
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      # -----------------------------------------------------------------------
      # Terraform Init
      # Initializes the backend and downloads providers
      # -----------------------------------------------------------------------
      - name: Terraform Init
        id: init
        run: terraform init

      # -----------------------------------------------------------------------
      # Terraform Validate
      # Validates the configuration syntax
      # -----------------------------------------------------------------------
      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      # -----------------------------------------------------------------------
      # Terraform Plan
      # Creates an execution plan showing what will change
      # -----------------------------------------------------------------------
      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true

      # -----------------------------------------------------------------------
      # Post Plan to PR (for Pull Requests only)
      # -----------------------------------------------------------------------
      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN: ${{ steps.plan.outputs.stdout }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Terraform Format and Style 🖌\`${{ steps.fmt.outcome }}\`
            #### Terraform Initialization ⚙️\`${{ steps.init.outcome }}\`
            #### Terraform Validation 🤖\`${{ steps.validate.outcome }}\`
            #### Terraform Plan 📖\`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${process.env.PLAN}
            \`\`\`

            </details>

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      # -----------------------------------------------------------------------
      # Upload Plan for Apply job
      # -----------------------------------------------------------------------
      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan

      # -----------------------------------------------------------------------
      # Fail if plan failed
      # -----------------------------------------------------------------------
      - name: Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # ===========================================================================
  # Terraform Apply - Only runs on push to main (after successful plan)
  # ===========================================================================
  terraform-apply:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    # Use GitHub Environment for additional protection (optional)
    # environment:
    #   name: production
    #   url: ${{ steps.apply.outputs.couchdb_url }}

    steps:
      # -----------------------------------------------------------------------
      # Checkout repository
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Authenticate to GCP
      # -----------------------------------------------------------------------
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true

      # -----------------------------------------------------------------------
      # Setup Terraform
      # -----------------------------------------------------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      # -----------------------------------------------------------------------
      # Download Plan from previous job
      # -----------------------------------------------------------------------
      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      # -----------------------------------------------------------------------
      # Terraform Init
      # -----------------------------------------------------------------------
      - name: Terraform Init
        run: terraform init

      # -----------------------------------------------------------------------
      # Terraform Apply
      # Applies the saved plan (no confirmation needed)
      # -----------------------------------------------------------------------
      - name: Terraform Apply
        id: apply
        run: terraform apply -auto-approve tfplan

      # -----------------------------------------------------------------------
      # Output Results
      # -----------------------------------------------------------------------
      - name: Get Outputs
        id: outputs
        run: |
          echo "## 🚀 Deployment Outputs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Output | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| VM External IP | $(terraform output -raw vm_external_ip) |" >> $GITHUB_STEP_SUMMARY
          echo "| SSH | $(terraform output -raw ssh_command) |" >> $GITHUB_STEP_SUMMARY

          MCPVAULT_URL=$(terraform output -raw mcpvault_url)
          if [ "$MCPVAULT_URL" != "Enable enable_mcpvault + enable_https to get HTTPS URL" ]; then
            echo "| **MCPVault SSE** | **$MCPVAULT_URL** |" >> $GITHUB_STEP_SUMMARY
          fi

          COUCHDB_URL=$(terraform output -raw couchdb_url)
          if [ "$COUCHDB_URL" != "CouchDB not enabled" ]; then
            echo "| CouchDB | $COUCHDB_URL |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          HEADLESS=$(terraform output -raw obsidian_headless_next_steps)
          if [ "$HEADLESS" != "Headless Obsidian not enabled (enable_headless_obsidian = false)" ]; then
            echo "### 🖐️ Manual steps required" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$HEADLESS" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
